# H2 InMemory DB Configuration
spring.datasource.url=jdbc:h2:mem:devlog_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable automatic redis interaction in tests if context loads, but since RedisConnectionFactory creates bean,
# we may mock or configure minimal properties. By default, Spring Boot test will try to connect to localhost:6379.
# We can mock RedisConnectionFactory / RedisTemplate in active Integration tests if needed.
spring.data.redis.host=localhost
spring.data.redis.port=6379
